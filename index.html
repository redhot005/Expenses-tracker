<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<title>Expenses</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F172A;--bg2:#1E293B;--border:#334155;--text:#F8FAFC;--text2:#E2E8F0;--muted:#94A3B8;--dim:#64748B;--dim2:#475569;--navbg:#0F172A;--inputbg:#0F172A;--overlay:rgba(15,23,42,.92);--datecs:dark}
.light{--bg:#F8FAFC;--bg2:#FFFFFF;--border:#E2E8F0;--text:#0F172A;--text2:#1E293B;--muted:#64748B;--dim:#94A3B8;--dim2:#CBD5E1;--navbg:#FFFFFF;--inputbg:#F1F5F9;--overlay:rgba(0,0,0,.5);--datecs:light}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;padding-bottom:72px;min-height:100vh;transition:background .2s,color .2s}
input::placeholder{color:var(--dim)}
input:focus{border-color:#F97316!important;outline:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=date]{color-scheme:var(--datecs)}
.mono{font-family:'Space Mono',monospace}
.card{background:var(--bg2);border-radius:12px;border:1px solid var(--border);transition:background .2s}
.label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#22C55E;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;display:none}
.toast.show{display:block}
.header{padding:20px 20px 12px;padding-top:calc(env(safe-area-inset-top, 0px) + 20px);display:flex;align-items:center;justify-content:space-between}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--navbg);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100;transition:background .2s}
.nav button{flex:1;background:none;border:none;cursor:pointer;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav .ic{font-size:18px;opacity:.4}
.nav .lb{font-size:9px;color:var(--dim)}
.nav button.on .ic{opacity:1}
.nav button.on .lb{color:#F97316;font-weight:700}
.content{padding:0 16px}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.cb{border-radius:10px;padding:10px 2px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid var(--border);background:var(--bg2);transition:background .2s}
.cb.s{background:var(--c22);border-color:var(--c)}
.cb .ci{font-size:20px}
.cb .cl{font-size:9px;color:var(--muted);font-weight:600;text-align:center;line-height:1.2}
.cb.s .cl{color:var(--c)}
.vw{display:none}
.vw.on{display:block}
.pb{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px}
.bc{display:flex;align-items:flex-end;justify-content:space-between;height:160px;gap:4px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:6px 6px 0 0;background:#F97316;min-height:2px}
.cr{display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:6px;border-radius:10px;background:var(--bg2);border:1px solid var(--border)}
.clg{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px}
.co{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.co.s{border-color:var(--text);transform:scale(1.1)}
.eb{display:flex;align-items:center;gap:10px;width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;cursor:pointer;margin-bottom:8px}
@media print{body>*:not(#reportOv){display:none!important}#reportOv{position:static!important}#reportOv>div:first-child{display:none!important}}
.toggle{position:relative;width:48px;height:26px;background:var(--border);border-radius:13px;cursor:pointer;transition:background .2s;border:none;padding:0}
.toggle.on{background:#F97316}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .toggle-knob{left:25px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
<div><h1 style="font-size:22px;letter-spacing:-1px" class="mono">&#x1F4B0; Expenses</h1><p style="margin-top:4px;font-size:13px;color:var(--muted)" id="dl"></p></div>
<div style="display:flex;align-items:center;gap:12px">
<button class="toggle" id="themeToggle" onclick="toggleTheme()"><div class="toggle-knob"></div></button>
<div style="text-align:right"><div class="label">Today</div><div id="tt" class="mono" style="font-size:20px;font-weight:700;color:var(--dim2)">&#x20B1;0.00</div></div>
</div></div>
<div class="content">
<div class="vw on" id="v-add">
<div style="margin:20px 0 16px;text-align:center"><div class="label">Amount</div>
<div style="display:flex;align-items:center;justify-content:center;margin-top:8px">
<span class="mono" style="font-size:28px;color:var(--dim);margin-right:4px">&#x20B1;</span>
<input type="number" inputmode="decimal" id="ai" placeholder="0.00" class="mono" style="background:transparent;border:none;border-bottom:2px solid var(--border);color:var(--text);font-size:36px;font-weight:700;text-align:center;width:70%;padding:4px 0">
</div></div>
<div style="margin-bottom:16px"><div class="label">Category</div><div class="cg" id="cg"></div></div>
<div id="cs" style="display:none;margin-bottom:16px"><div class="label">Apply payment to</div><div id="copt" style="margin-top:8px"></div></div>
<div style="margin-bottom:16px"><div class="label" style="margin-bottom:6px">Date</div><div style="position:relative;height:48px"><input type="date" id="di" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.01;z-index:2;font-size:16px"><div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;padding:0 16px;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;z-index:1"><span style="font-size:20px">&#x1F4C5;</span><span id="dateText" style="font-size:14px;color:var(--text)">Today</span></div></div></div>
<input type="text" id="ni" placeholder="Add a note (optional)" style="width:100%;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;margin-bottom:16px">
<button id="ab" class="btn" style="width:100%;padding:16px;background:#334155;border-radius:14px;color:#64748B;font-size:16px;font-weight:700">Add Expense</button>
<div id="te" style="margin-top:24px"></div>
</div>
<div class="vw" id="v-today"><h2 style="font-size:16px;font-weight:600;margin:16px 0;color:var(--text2)">Today's Breakdown</h2><div id="tb"></div></div>
<div class="vw" id="v-credits"><div id="cc"></div></div>
<div class="vw" id="v-summary"><div id="smc"></div></div>
<div class="vw" id="v-charts"><div id="chc"></div></div>
<div class="vw" id="v-settings">
<h2 style="font-size:16px;font-weight:600;margin:16px 0;color:var(--text2)">Settings</h2>
<div class="label" style="margin-bottom:10px">Theme</div>
<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;margin-bottom:20px">
<div><div style="font-size:14px;font-weight:600;color:var(--text2)" id="themeLabel">Dark Mode</div><div style="font-size:11px;color:var(--dim)">Toggle light/dark appearance</div></div>
<button class="toggle" id="themeToggle2" onclick="toggleTheme()"><div class="toggle-knob"></div></button>
</div>
<div class="label" style="margin-bottom:10px">Categories</div>
<div id="catList"></div>
<button onclick="showAddCat()" class="btn" style="width:100%;padding:12px;background:transparent;border:2px dashed var(--dim2);border-radius:10px;color:var(--muted);font-size:13px;margin:8px 0 24px">+ Add New Category</button>
<div class="label" style="margin-bottom:10px">Export Data</div>
<button onclick="exCSV()" class="eb"><span style="font-size:24px">&#x1F4CA;</span><div><div style="font-size:14px;font-weight:600;color:var(--text2)">Export CSV</div><div style="font-size:11px;color:var(--dim)">Spreadsheet-ready file</div></div></button>
<button onclick="exPDF()" class="eb"><span style="font-size:24px">&#x1F4C4;</span><div><div style="font-size:14px;font-weight:600;color:var(--text2)">Export PDF Report</div><div style="font-size:11px;color:var(--dim)">Formatted summary</div></div></button>
<div style="margin-top:16px;padding:12px 16px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)">
<div style="font-size:12px;color:var(--dim)">Data: <span class="mono" style="color:var(--muted)" id="sc1">0</span> expenses / <span class="mono" style="color:var(--muted)" id="sc2">&#x20B1;0.00</span></div>
</div>
</div>
</div>
<div class="nav">
<button data-v="add" class="on"><span class="ic">&#x2795;</span><span class="lb">Add</span></button>
<button data-v="today"><span class="ic">&#x1F4CB;</span><span class="lb">Today</span></button>
<button data-v="credits"><span class="ic">&#x1F4B3;</span><span class="lb">Credits</span></button>
<button data-v="summary"><span class="ic">&#x1F4CA;</span><span class="lb">Summary</span></button>
<button data-v="charts"><span class="ic">&#x1F4C8;</span><span class="lb">Charts</span></button>
<button data-v="settings"><span class="ic">&#x2699;&#xFE0F;</span><span class="lb">Settings</span></button>
</div>
<div id="catOv" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200">
<div onclick="document.getElementById('catOv').style.display='none'" style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6)"></div>
<div style="position:absolute;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px env(safe-area-inset-bottom,20px);max-height:85vh;overflow-y:auto">
<div style="width:40px;height:4px;background:var(--dim2);border-radius:2px;margin:0 auto 16px"></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<h2 style="font-size:18px;font-weight:700" id="catOvT">Add Category</h2>
<button onclick="document.getElementById('catOv').style.display='none'" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:14px;cursor:pointer;padding:8px 14px;font-weight:600">Cancel</button>
</div>
<div style="margin-bottom:16px"><div class="label" style="margin-bottom:6px">Icon (emoji)</div>
<input type="text" id="catI" placeholder="e.g. &#x1F3E5;" style="width:100%;padding:10px 14px;background:var(--inputbg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:24px;text-align:center"></div>
<div style="margin-bottom:16px"><div class="label" style="margin-bottom:6px">Name</div>
<input type="text" id="catN" placeholder="e.g. Medical" style="width:100%;padding:10px 14px;background:var(--inputbg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px"></div>
<div style="margin-bottom:24px"><div class="label" style="margin-bottom:6px">Color</div><div class="clg" id="clg"></div></div>
<button onclick="saveCat()" class="btn" style="width:100%;padding:14px;background:linear-gradient(135deg,#F97316,#FB923C);border-radius:14px;color:#fff;font-size:16px;font-weight:700">Save Category</button>
</div></div>
<div id="reportOv" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;background:#fff;overflow-y:auto">
<div style="position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;padding:12px 20px;padding-top:calc(env(safe-area-inset-top, 12px) + 12px);display:flex;justify-content:space-between;align-items:center;z-index:10">
<button onclick="document.getElementById('reportOv').style.display='none'" style="padding:12px 24px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;background:#f1f5f9;color:#64748B">&#x2190; Close</button>
<span style="font-weight:600;font-size:14px;color:#1a1a1a">Report</span>
<button onclick="window.print()" style="padding:12px 24px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;background:#F97316;color:#fff">Save PDF</button>
</div>
<div id="reportBody" style="padding:20px;max-width:700px;margin:0 auto;color:#1a1a1a;font-family:Arial,sans-serif"></div>
</div>
<script>
try{
// Theme
var isDark=localStorage.getItem("rex-theme")!=="light";
function applyTheme(){
if(isDark){document.body.classList.remove("light")}else{document.body.classList.add("light")}
document.querySelectorAll(".toggle").forEach(function(t){if(isDark)t.classList.add("on");else t.classList.remove("on")});
var tl=document.getElementById("themeLabel");if(tl)tl.textContent=isDark?"Dark Mode":"Light Mode";
document.querySelector('meta[name="theme-color"]').content=isDark?"#0F172A":"#F8FAFC";
}
function toggleTheme(){isDark=!isDark;localStorage.setItem("rex-theme",isDark?"dark":"light");applyTheme()}
applyTheme();
var CL=["#E11D48","#DC2626","#F97316","#EAB308","#22C55E","#14B8A6","#06B6D4","#3B82F6","#6366F1","#8B5CF6","#A855F7","#EC4899","#059669","#0891B2","#7C3AED","#6B7280"];
var DC=[
{id:"dineout",l:"Dine Out",i:"\uD83C\uDF7D\uFE0F",c:"#E11D48"},
{id:"groceries",l:"Groceries",i:"\uD83D\uDED2",c:"#14B8A6"},
{id:"transport",l:"Transport / Gas",i:"\u26FD",c:"#3B82F6"},
{id:"house",l:"House Utilities",i:"\uD83C\uDFE0",c:"#EAB308"},
{id:"load",l:"Load / Data",i:"\uD83D\uDCF1",c:"#06B6D4"},
{id:"subs",l:"Subscriptions",i:"\uD83D\uDCFA",c:"#8B5CF6"},
{id:"insurance",l:"Insurance",i:"\uD83D\uDEE1\uFE0F",c:"#059669"},
{id:"credit",l:"Credit / Loans",i:"\uD83D\uDCB3",c:"#DC2626"},
{id:"fitness",l:"Fitness",i:"\uD83D\uDCAA",c:"#22C55E"},
{id:"baby",l:"Baby Needs",i:"\uD83D\uDC76",c:"#EC4899"},
{id:"family",l:"Family / Padala",i:"\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC67",c:"#A855F7"},
{id:"shopping",l:"Shopping",i:"\uD83D\uDECD\uFE0F",c:"#F97316"},
{id:"leisure",l:"Leisure",i:"\uD83C\uDFAF",c:"#6366F1"},
{id:"other",l:"Other",i:"\uD83D\uDCE6",c:"#6B7280"}
];
function ldCats(){try{var d=localStorage.getItem("rex-cats");if(d)return JSON.parse(d)}catch(x){}return DC.map(function(c){return{id:c.id,l:c.l,i:c.i,c:c.c}})}
function svCats(){localStorage.setItem("rex-cats",JSON.stringify(CATS))}
var CATS=ldCats();
var S={e:[],cr:[]},sc="",sci="",cv="add",ecid=null,selC="";
function ldS(){try{var d=localStorage.getItem("rex");if(d)S=JSON.parse(d)}catch(x){}}
function svS(){localStorage.setItem("rex",JSON.stringify(S))}
var fm=function(n){return"\u20B1"+Number(n||0).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2})};
var dk=function(d){var t=new Date(d);return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0")};
var tk=function(){return dk(new Date())};
var co=function(id){return CATS.find(function(x){return x.id===id})||{id:"?",l:"Unknown",i:"\u2753",c:"#6B7280"}};
var cn=function(id){var x=S.cr.find(function(c){return c.id===id});return x?x.name:""};
function fl(m){var t=document.getElementById("toast");t.textContent="\u2713 "+(m||"Saved!");t.className="toast show";setTimeout(function(){t.className="toast"},1500)}
document.getElementById("dl").textContent=new Date().toLocaleDateString("en-PH",{weekday:"long",month:"long",day:"numeric"});
document.getElementById("di").value=tk();
function updDT(){var v=document.getElementById("di").value;if(!v||v===tk()){document.getElementById("dateText").textContent="Today"}else{var d=new Date(v+"T12:00:00");document.getElementById("dateText").textContent=d.toLocaleDateString("en-PH",{weekday:"short",month:"short",day:"numeric"})}}
document.getElementById("di").addEventListener("change",updDT);updDT();

function bg(){
var gr=document.getElementById("cg");gr.innerHTML="";
CATS.forEach(function(cat){var b=document.createElement("button");b.className="cb"+(sc===cat.id?" s":"");b.style.setProperty("--c",cat.c);b.style.setProperty("--c22",cat.c+"22");b.innerHTML="<span class='ci'>"+cat.i+"</span><span class='cl'>"+cat.l.split(" / ")[0].split(" & ")[0]+"</span>";b.onclick=function(){sc=cat.id;bg();document.getElementById("cs").style.display=cat.id==="credit"?"block":"none";if(cat.id!=="credit")sci="";if(cat.id==="credit")rco();ub()};gr.appendChild(b)})}

document.querySelectorAll(".nav button").forEach(function(btn){btn.onclick=function(){document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("on")});btn.classList.add("on");document.querySelectorAll(".vw").forEach(function(v){v.classList.remove("on")});var v=btn.dataset.v;cv=v;document.getElementById("v-"+v).classList.add("on");if(v==="today")rtd();if(v==="credits")rcr();if(v==="summary")rsu();if(v==="charts")rch();if(v==="settings")rst()}});

function ub(){var b=document.getElementById("ab"),a=document.getElementById("ai").value,ok=a&&sc&&(sc!=="credit"||sci);b.style.background=ok?"linear-gradient(135deg,#F97316,#FB923C)":"#334155";b.style.color=ok?"#fff":"#64748B";b.textContent=sc==="credit"?"Log Payment":"Add Expense"}
document.getElementById("ai").addEventListener("input",ub);

document.getElementById("ab").onclick=function(){
var a=parseFloat(document.getElementById("ai").value);if(!a||!sc)return;if(sc==="credit"&&!sci)return;
var pd=document.getElementById("di").value;
var ed=pd?new Date(pd+"T12:00:00").toISOString():new Date().toISOString();
if(editingId){
var old=S.e.find(function(e){return e.id===editingId});
if(old&&old.cid){var ocr=S.cr.find(function(c){return c.id===old.cid});if(ocr)ocr.p=Math.max(0,(ocr.p||0)-old.a)}
old.a=a;old.cat=sc;old.n=document.getElementById("ni").value.trim();old.d=ed;old.cid=sc==="credit"?sci:undefined;
if(sc==="credit"&&sci){var ncr=S.cr.find(function(c){return c.id===sci});if(ncr)ncr.p=(ncr.p||0)+a}
S.e.sort(function(x,y){return new Date(y.d)-new Date(x.d)});
editingId=null;
svS();document.getElementById("ai").value="";document.getElementById("ni").value="";document.getElementById("di").value=tk();updDT();sc="";sci="";document.getElementById("cs").style.display="none";bg();ub();uh();rte();fl("Updated!")
}else{
var exp={id:Date.now().toString(),a:a,cat:sc,n:document.getElementById("ni").value.trim(),d:ed,cid:sc==="credit"?sci:undefined};
S.e.unshift(exp);S.e.sort(function(x,y){return new Date(y.d)-new Date(x.d)});
if(sc==="credit"&&sci){var cr=S.cr.find(function(c){return c.id===sci});if(cr)cr.p=(cr.p||0)+a}
svS();document.getElementById("ai").value="";document.getElementById("ni").value="";document.getElementById("di").value=tk();updDT();sc="";sci="";document.getElementById("cs").style.display="none";bg();ub();uh();rte();fl(exp.cid?"Payment logged!":"Saved!")
}};

function de(id){var exp=S.e.find(function(e){return e.id===id});if(!exp)return;if(!confirm("Delete "+co(exp.cat).i+" "+fm(exp.a)+"?"))return;if(exp.cid){var cr=S.cr.find(function(c){return c.id===exp.cid});if(cr)cr.p=Math.max(0,(cr.p||0)-exp.a)}S.e=S.e.filter(function(e){return e.id!==id});svS();uh();rte();if(cv==="today")rtd()}

var editingId=null;
function ee(id){
var exp=S.e.find(function(e){return e.id===id});if(!exp)return;
editingId=id;
document.getElementById("ai").value=exp.a;
sc=exp.cat;bg();
document.getElementById("di").value=dk(exp.d);updDT();
document.getElementById("ni").value=exp.n||"";
if(exp.cat==="credit"&&exp.cid){sci=exp.cid;document.getElementById("cs").style.display="block";rco()}
document.getElementById("ab").textContent="Update Expense";
document.getElementById("ab").style.background="linear-gradient(135deg,#F97316,#FB923C)";
document.getElementById("ab").style.color="#fff";
document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("on")});
document.querySelectorAll(".nav button")[0].classList.add("on");
document.querySelectorAll(".vw").forEach(function(v){v.classList.remove("on")});
document.getElementById("v-add").classList.add("on");cv="add";
window.scrollTo(0,0);
