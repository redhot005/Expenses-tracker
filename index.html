<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<title>Expenses</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0F172A;color:#F8FAFC;font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;padding-bottom:72px;min-height:100vh;padding-top:env(safe-area-inset-top,0)}
input::placeholder{color:#475569}input:focus{border-color:#F97316!important;outline:none}
select{background:#0F172A;color:#F8FAFC;border:1px solid #334155;border-radius:10px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:100%}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.mono{font-family:'Space Mono',monospace}.card{background:#1E293B;border-radius:12px;border:1px solid #334155}
.label{font-size:12px;color:#64748B;text-transform:uppercase;letter-spacing:1px}
.btn{border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#22C55E;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;display:none;box-shadow:0 8px 24px rgba(34,197,94,.3)}
.toast.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.header{padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:#0F172A;border-top:1px solid #1E293B;padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100}
.nav button{flex:1;background:none;border:none;cursor:pointer;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav .icon{font-size:18px}.nav .lbl{font-size:9px;font-weight:400;color:#475569}
.nav button.active .icon{opacity:1}.nav button .icon{opacity:.4}
.nav button.active .lbl{color:#F97316;font-weight:700}
.content{padding:0 16px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.cat-btn{border-radius:10px;padding:10px 2px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid #334155;background:#1E293B;transition:all .15s}
.cat-btn.sel{background:var(--c22);border-color:var(--c)}
.cat-btn .ci{font-size:20px}.cat-btn .cl{font-size:9px;color:#94A3B8;font-weight:600;text-align:center;line-height:1.2}
.cat-btn.sel .cl{color:var(--c)}
.view{display:none}.view.active{display:block}
.pbar{height:8px;background:#334155;border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .3s}
.bar-chart{display:flex;align-items:flex-end;justify-content:space-between;height:160px;gap:4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:6px 6px 0 0;background:#F97316;min-height:2px}
.cat-row{display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:6px;border-radius:10px;background:#1E293B;border:1px solid #334155}
.cat-row .cat-icon{font-size:20px;width:28px;text-align:center}
.cat-row .cat-name{flex:1;font-size:13px;font-weight:600;color:#E2E8F0}
.cat-row .cat-color{width:12px;height:12px;border-radius:3px}
.cat-row button{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.92);z-index:200;overflow-y:auto;padding:20px;max-width:480px;margin:0 auto}
.overlay-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px}
.color-opt{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.color-opt.sel{border-color:#F8FAFC;transform:scale(1.1)}
.export-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px 16px;background:#1E293B;border:1px solid #334155;border-radius:12px;cursor:pointer;margin-bottom:8px;transition:background .15s}
.export-btn:active{background:#334155}
.export-btn .eicon{font-size:24px}
.export-btn .elabel{font-size:14px;font-weight:600;color:#E2E8F0}
.export-btn .edesc{font-size:11px;color:#64748B}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
<div><h1 style="font-size:22px;letter-spacing:-1px" class="mono">💰 Expenses</h1><p style="margin-top:4px;font-size:13px;color:#94A3B8" id="dl"></p></div>
<div style="text-align:right"><div class="label">Today</div><div id="tt" class="mono" style="font-size:20px;font-weight:700;color:#475569">₱0.00</div></div>
</div>
<div class="content">
<div class="view active" id="v-add">
<div style="margin:20px 0 16px;text-align:center"><div class="label">Amount</div>
<div style="display:flex;align-items:center;justify-content:center;margin-top:8px">
<span class="mono" style="font-size:28px;color:#64748B;margin-right:4px">₱</span>
<input type="number" inputmode="decimal" id="ai" placeholder="0.00" class="mono" style="background:transparent;border:none;border-bottom:2px solid #334155;color:#F8FAFC;font-size:36px;font-weight:700;text-align:center;width:70%;padding:4px 0">
</div></div>
<div style="margin-bottom:16px"><div class="label">Category</div><div class="cat-grid" id="cg"></div></div>
<div id="cs" style="display:none;margin-bottom:16px"><div class="label">Apply payment to</div><div id="co" style="margin-top:8px"></div></div>
<input type="text" id="ni" placeholder="Add a note (optional)" style="width:100%;padding:12px 16px;background:#1E293B;border:1px solid #334155;border-radius:12px;color:#F8FAFC;font-size:14px;margin-bottom:16px">
<button id="ab" class="btn" style="width:100%;padding:16px;background:#334155;border-radius:14px;color:#64748B;font-size:16px;font-weight:700">Add Expense</button>
<div id="te" style="margin-top:24px"></div>
</div>
<div class="view" id="v-today"><h2 style="font-size:16px;font-weight:600;margin:16px 0;color:#E2E8F0">Today's Breakdown</h2><div id="tb"></div></div>
<div class="view" id="v-credits"><div id="cc"></div></div>
<div class="view" id="v-summary"><div id="sc"></div></div>
<div class="view" id="v-charts"><div id="ch"></div></div>
<div class="view" id="v-settings">
<h2 style="font-size:16px;font-weight:600;margin:16px 0;color:#E2E8F0">Settings</h2>
<!-- Categories Section -->
<div class="label" style="margin-bottom:10px">Categories</div>
<div id="catList"></div>
<button onclick="showAddCat()" class="btn" style="width:100%;padding:12px;background:transparent;border:2px dashed #475569;border-radius:10px;color:#94A3B8;font-size:13px;margin:8px 0 24px">+ Add New Category</button>
<!-- Export Section -->
<div class="label" style="margin-bottom:10px">Export Data</div>
<button onclick="exportCSV()" class="export-btn"><span class="eicon">📊</span><div><div class="elabel">Export CSV</div><div class="edesc">Spreadsheet-ready file with all expenses</div></div></button>
<button onclick="exportPDF()" class="export-btn"><span class="eicon">📄</span><div><div class="elabel">Export PDF Report</div><div class="edesc">Formatted summary with category breakdown</div></div></button>
<div style="margin-top:16px;padding:12px 16px;background:#1E293B;border-radius:12px;border:1px solid #334155">
<div style="font-size:12px;color:#64748B">Data: <span class="mono" style="color:#94A3B8" id="statCount">0</span> expenses · <span class="mono" style="color:#94A3B8" id="statTotal">₱0.00</span> total</div>
</div>
<button onclick="if(confirm('Delete ALL expenses and credits? This cannot be undone.')){S.e=[];S.cr=[];sv();uh();fl('All data cleared')}" class="btn" style="width:100%;padding:12px;background:transparent;border:1px solid #DC2626;border-radius:10px;color:#DC2626;font-size:13px;margin-top:12px">Clear All Data</button>
</div>
</div>
<div class="nav">
<button data-v="add" class="active"><span class="icon">➕</span><span class="lbl">Add</span></button>
<button data-v="today"><span class="icon">📋</span><span class="lbl">Today</span></button>
<button data-v="credits"><span class="icon">💳</span><span class="lbl">Credits</span></button>
<button data-v="summary"><span class="icon">📊</span><span class="lbl">Summary</span></button>
<button data-v="charts"><span class="icon">📈</span><span class="lbl">Charts</span></button>
<button data-v="settings"><span class="icon">⚙️</span><span class="lbl">Settings</span></button>
</div>

<!-- Add/Edit Category Overlay -->
<div class="overlay" id="catOverlay" style="display:none">
<div class="overlay-header">
<h2 style="font-size:18px;font-weight:700" id="catOverlayTitle">Add Category</h2>
<button onclick="closeCatOverlay()" style="background:none;border:none;color:#94A3B8;font-size:24px;cursor:pointer">✕</button>
</div>
<div style="margin-bottom:16px">
<div class="label" style="margin-bottom:6px">Icon (emoji)</div>
<input type="text" id="catIcon" placeholder="e.g. 🏥" style="width:100%;padding:10px 14px;background:#0F172A;border:1px solid #334155;border-radius:10px;color:#F8FAFC;font-size:24px;text-align:center">
</div>
<div style="margin-bottom:16px">
<div class="label" style="margin-bottom:6px">Name</div>
<input type="text" id="catName" placeholder="e.g. Medical" style="width:100%;padding:10px 14px;background:#0F172A;border:1px solid #334155;border-radius:10px;color:#F8FAFC;font-size:14px">
</div>
<div style="margin-bottom:24px">
<div class="label" style="margin-bottom:6px">Color</div>
<div class="color-grid" id="colorGrid"></div>
</div>
<button onclick="saveCat()" class="btn" style="width:100%;padding:14px;background:linear-gradient(135deg,#F97316,#FB923C);border-radius:14px;color:#fff;font-size:16px;font-weight:700">Save Category</button>
</div>

<script>
// Available colors
var COLORS=["#E11D48","#DC2626","#F97316","#EAB308","#22C55E","#14B8A6","#06B6D4","#3B82F6","#6366F1","#8B5CF6","#A855F7","#EC4899","#059669","#0891B2","#7C3AED","#6B7280"];

// Default categories
var DEF_CATS=[
{id:"dineout",l:"Dine Out",i:"🍽️",c:"#E11D48"},
{id:"groceries",l:"Groceries",i:"🛒",c:"#14B8A6"},
{id:"transport",l:"Transport / Gas",i:"⛽",c:"#3B82F6"},
{id:"house",l:"House Utilities",i:"🏠",c:"#EAB308"},
{id:"load",l:"Load / Data",i:"📱",c:"#06B6D4"},
{id:"subs",l:"Subscriptions",i:"📺",c:"#8B5CF6"},
{id:"insurance",l:"Insurance",i:"🛡️",c:"#059669"},
{id:"credit",l:"Credit / Loans",i:"💳",c:"#DC2626"},
{id:"fitness",l:"Fitness",i:"💪",c:"#22C55E"},
{id:"baby",l:"Baby Needs",i:"👶",c:"#EC4899"},
{id:"family",l:"Family / Padala",i:"👨‍👩‍👧",c:"#A855F7"},
{id:"shopping",l:"Shopping",i:"🛍️",c:"#F97316"},
{id:"leisure",l:"Leisure",i:"🎯",c:"#6366F1"},
{id:"other",l:"Other",i:"📦",c:"#6B7280"}
];

// Load custom categories or use defaults
function loadCats(){
  try{var d=localStorage.getItem("rex-cats");if(d)return JSON.parse(d)}catch(e){}
  return DEF_CATS.map(function(c){return{id:c.id,l:c.l,i:c.i,c:c.c}});
}
function saveCats(){localStorage.setItem("rex-cats",JSON.stringify(CATS))}
var CATS=loadCats();

var S={e:[],cr:[]},sc="",sci="",cv="add",editCatId=null,selColor="";
function ld(){try{var d=localStorage.getItem("rex");if(d)S=JSON.parse(d)}catch(e){}}
function sv(){try{localStorage.setItem("rex",JSON.stringify(S))}catch(e){}}
var fm=function(n){return"₱"+Number(n||0).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2})};
var dk=function(d){var t=new Date(d);return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0")};
var tk=function(){return dk(new Date())};
var co=function(id){return CATS.find(function(x){return x.id===id})||{id:"?",l:"Unknown",i:"❓",c:"#6B7280"}};
var cn=function(id){var x=S.cr.find(function(c){return c.id===id});return x?x.name:""};
function fl(m){var t=document.getElementById("toast");t.textContent="✓ "+(m||"Saved!");t.classList.add("show");setTimeout(function(){t.classList.remove("show")},1500)}
document.getElementById("dl").textContent=new Date().toLocaleDateString("en-PH",{weekday:"long",month:"long",day:"numeric"});

// Build category grid
function buildGrid(){
  var gr=document.getElementById("cg");gr.innerHTML="";
  CATS.forEach(function(cat){
    var b=document.createElement("button");b.className="cat-btn"+(sc===cat.id?" sel":"");b.style.setProperty("--c",cat.c);b.style.setProperty("--c22",cat.c+"22");
    b.innerHTML='<span class="ci">'+cat.i+'</span><span class="cl">'+cat.l.split(" / ")[0].split(" & ")[0]+"</span>";
    b.onclick=function(){sc=cat.id;buildGrid();document.getElementById("cs").style.display=cat.id==="credit"?"block":"none";if(cat.id!=="credit")sci="";if(cat.id==="credit")rco();ub()};
    gr.appendChild(b);
  });
}

// Nav
document.querySelectorAll(".nav button").forEach(function(btn){btn.onclick=function(){document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("active")});btn.classList.add("active");document.querySelectorAll(".view").forEach(function(v){v.classList.remove("active")});var v=btn.dataset.v;cv=v;document.getElementById("v-"+v).classList.add("active");if(v==="today")rtd();if(v==="credits")rcr();if(v==="summary")rsu();if(v==="charts")rch();if(v==="settings")rset()}});

function ub(){var b=document.getElementById("ab"),a=document.getElementById("ai").value,ok=a&&sc&&(sc!=="credit"||sci);b.style.background=ok?"linear-gradient(135deg,#F97316,#FB923C)":"#334155";b.style.color=ok?"#fff":"#64748B";b.style.boxShadow=ok?"0 4px 20px rgba(249,115,22,.3)":"none";b.textContent=sc==="credit"?"Log Payment":"Add Expense"}
document.getElementById("ai").addEventListener("input",ub);

// Add expense
document.getElementById("ab").onclick=function(){var a=parseFloat(document.getElementById("ai").value);if(!a||!sc)return;if(sc==="credit"&&!sci)return;var exp={id:Date.now().toString(),a:a,cat:sc,n:document.getElementById("ni").value.trim(),d:new Date().toISOString(),cid:sc==="credit"?sci:undefined};S.e.unshift(exp);if(sc==="credit"&&sci){var cr=S.cr.find(function(c){return c.id===sci});if(cr)cr.p=(cr.p||0)+a}sv();document.getElementById("ai").value="";document.getElementById("ni").value="";sc="";sci="";document.getElementById("cs").style.display="none";buildGrid();ub();uh();rte();fl(exp.cid?"Payment logged!":"Saved!")};

function de(id){var exp=S.e.find(function(e){return e.id===id});if(!exp)return;if(!confirm("Delete "+co(exp.cat).i+" "+fm(exp.a)+"?")){return}if(exp.cid){var cr=S.cr.find(function(c){return c.id===exp.cid});if(cr)cr.p=Math.max(0,(cr.p||0)-exp.a)}S.e=S.e.filter(function(e){return e.id!==id});sv();uh();rte();if(cv==="today")rtd()}

function uh(){var today=S.e.filter(function(e){return dk(e.d)===tk()}),total=today.reduce(function(s,e){return s+e.a},0),el=document.getElementById("tt");el.textContent=fm(total);el.style.color=total>0?"#F97316":"#475569"}

function rte(){var el=document.getElementById("te"),today=S.e.filter(function(e){return dk(e.d)===tk()});if(!today.length){el.innerHTML="";return}var h='<div class="label" style="margin-bottom:10px">Today\'s Entries</div>';today.slice(0,5).forEach(function(e){var cat=co(e.cat),cr=e.cid?" → "+cn(e.cid):"",nt=e.n?" — "+e.n:"";h+='<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:6px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">'+cat.i+'</span><span style="font-size:13px;font-weight:600;color:#E2E8F0">'+cat.l+cr+nt+'</span></div><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-size:14px;font-weight:700;color:'+cat.c+'">'+fm(e.a)+'</span><button onclick="de(\''+e.id+'\')" style="background:none;border:none;color:#475569;font-size:16px;cursor:pointer">✕</button></div></div>'});el.innerHTML=h}

function rco(){var el=document.getElementById("co");if(!S.cr.length){el.innerHTML='<div class="card" style="padding:14px 16px;text-align:center"><div style="font-size:13px;color:#94A3B8;margin-bottom:8px">No credits yet</div></div>';return}var h="";S.cr.forEach(function(cr){var rem=cr.t-(cr.p||0),pct=cr.t>0?((cr.p||0)/cr.t)*100:0,sel=sci===cr.id;h+='<button onclick="sci=\''+cr.id+'\';rco();ub()" class="card" style="width:100%;text-align:left;padding:12px 14px;margin-bottom:6px;cursor:pointer;border:'+(sel?"2px solid #DC2626":"1px solid #334155")+";background:"+(sel?"#DC262615":"#1E293B")+'"><div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600;color:#E2E8F0">💳 '+cr.name+'</span><span class="mono" style="font-size:12px;color:#DC2626;font-weight:700">'+fm(rem)+'</span></div><div style="margin-top:6px;height:4px;background:#334155;border-radius:2px"><div style="height:4px;width:'+Math.min(pct,100)+"%;background:"+(pct>=100?"#22C55E":"#DC2626")+';border-radius:2px"></div></div><div style="font-size:10px;color:#64748B;margin-top:4px">'+pct.toFixed(0)+"% paid of "+fm(cr.t)+"</div></button>"});el.innerHTML=h}

// TODAY
function rtd(){var el=document.getElementById("tb"),today=S.e.filter(function(e){return dk(e.d)===tk()});if(!today.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#475569"><div style="font-size:40px;margin-bottom:8px">📝</div>No expenses today yet</div>';return}var total=today.reduce(function(s,e){return s+e.a},0),h="";CATS.map(function(cat){return{l:cat.l,i:cat.i,c:cat.c,t:today.filter(function(e){return e.cat===cat.id}).reduce(function(s,e){return s+e.a},0)}}).filter(function(x){return x.t>0}).forEach(function(cat){h+='<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">'+cat.i+'</span><span style="font-size:14px;color:#E2E8F0">'+cat.l+'</span></div><div style="display:flex;align-items:center;gap:10px"><div style="height:6px;width:'+Math.max(20,(cat.t/total)*120)+"px;border-radius:3px;background:"+cat.c+'"></div><span class="mono" style="font-size:14px;font-weight:700;color:'+cat.c+'">'+fm(cat.t)+"</span></div></div>"});h+='<div class="label" style="margin:20px 0 10px">All Entries</div>';today.forEach(function(e){var cat=co(e.cat),time=new Date(e.d).toLocaleTimeString("en-PH",{hour:"numeric",minute:"2-digit"});h+='<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:6px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">'+cat.i+'</span><div><div style="font-size:13px;font-weight:600;color:#E2E8F0">'+cat.l+(e.cid?" → "+cn(e.cid):"")+(e.n?" — "+e.n:"")+'</div><div style="font-size:11px;color:#64748B">'+time+'</div></div></div><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-size:14px;font-weight:700;color:'+cat.c+'">'+fm(e.a)+'</span><button onclick="de(\''+e.id+"');rtd()\" style=\"background:none;border:none;color:#475569;font-size:16px;cursor:pointer\">✕</button></div></div>"});el.innerHTML=h}

// CREDITS
function rcr(){var el=document.getElementById("cc"),tb=S.cr.reduce(function(s,c){return s+(c.t-(c.p||0))},0);var h='<div style="background:linear-gradient(135deg,#7F1D1D,#991B1B);border-radius:14px;padding:18px 20px;margin:16px 0;border:1px solid #DC2626"><div style="font-size:11px;color:#FCA5A5;text-transform:uppercase;letter-spacing:1px">Total Outstanding</div><div class="mono" style="font-size:28px;font-weight:700;color:#FEE2E2;margin-top:4px">'+fm(tb)+'</div><div style="font-size:12px;color:#FCA5A5;margin-top:2px">'+S.cr.length+" credit"+(S.cr.length!==1?"s":"")+'</div></div><button onclick="sacf()" class="btn" id="acb" style="width:100%;padding:14px;background:transparent;border:2px dashed #475569;border-radius:12px;color:#94A3B8;font-size:14px;margin-bottom:16px">+ Add New Credit / Loan</button><div id="acf" style="display:none"></div>';if(!S.cr.length)h+='<div style="text-align:center;padding:40px;color:#475569"><div style="font-size:40px;margin-bottom:8px">💳</div>No credits yet</div>';

function rset(){
  var el=document.getElementById("catList");
  var h="";
  CATS.forEach(function(cat,i){
    h+='<div class="cat-row"><span class="cat-icon">'+cat.i+'</span><span class="cat-name">'+cat.l+'</span><div class="cat-color" style="background:'+cat.c+'"></div>';
    h+='<button onclick="moveCat('+i+',-1)" style="color:#64748B" title="Move up">▲</button>';
    h+='<button onclick="moveCat('+i+',1)" style="color:#64748B" title="Move down">▼</button>';
    h+='<button onclick="openEditCat(\''+cat.id+'\')" style="color:#F97316" title="Edit">✏️</button>';
    if(cat.id!=="credit")h+='<button onclick="deleteCat(\''+cat.id+'\')" style="color:#DC2626" title="Delete">✕</button>';
    h+="</div>";
  });
  el.innerHTML=h;
  document.getElementById("statCount").textContent=S.e.length;
  document.getElementById("statTotal").textContent=fm(S.e.reduce(function(s,e){return s+e.a},0));
}

function moveCat(i,dir){
  var j=i+dir;
  if(j<0||j>=CATS.length)return;
  var tmp=CATS[i];CATS[i]=CATS[j];CATS[j]=tmp;
  saveCats();buildGrid();rset();
}

function deleteCat(id){
  var used=S.e.some(function(e){return e.cat===id});
  if(used){if(!confirm("This category has expenses. Delete anyway? (expenses will show as 'Unknown')"))return}
  CATS=CATS.filter(function(c){return c.id!==id});
  saveCats();buildGrid();rset();fl("Category deleted");
}

// Color grid
function buildColorGrid(){
  var el=document.getElementById("colorGrid");el.innerHTML="";
  COLORS.forEach(function(c){
    var d=document.createElement("div");
    d.className="color-opt"+(selColor===c?" sel":"");
    d.style.background=c;
    d.onclick=function(){selColor=c;buildColorGrid()};
    el.appendChild(d);
  });
}

function showAddCat(){
  editCatId=null;selColor=COLORS[0];
  document.getElementById("catOverlayTitle").textContent="Add Category";
  document.getElementById("catIcon").value="";
  document.getElementById("catName").value="";
  buildColorGrid();
  document.getElementById("catOverlay").style.display="block";
}

function openEditCat(id){
  var cat=CATS.find(function(c){return c.id===id});if(!cat)return;
  editCatId=id;selColor=cat.c;
  document.getElementById("catOverlayTitle").textContent="Edit Category";
  document.getElementById("catIcon").value=cat.i;
  document.getElementById("catName").value=cat.l;
  buildColorGrid();
  document.getElementById("catOverlay").style.display="block";
}

function closeCatOverlay(){document.getElementById("catOverlay").style.display="none"}

function saveCat(){
  var icon=document.getElementById("catIcon").value.trim();
  var name=document.getElementById("catName").value.trim();
  if(!icon||!name||!selColor)return;
  if(editCatId){
    var cat=CATS.find(function(c){return c.id===editCatId});
    if(cat){cat.i=icon;cat.l=name;cat.c=selColor}
  }else{
    CATS.push({id:"cat_"+Date.now(),i:icon,l:name,c:selColor});
  }
  saveCats();buildGrid();closeCatOverlay();rset();
  fl(editCatId?"Category updated":"Category added");
}

function exportCSV(){
  if(!S.e.length){fl("No data to export");return}
  var rows=["Date,Category,Amount,Note,Credit"];
  S.e.forEach(function(e){
    var cat=co(e.cat);
    var date=new Date(e.d).toLocaleDateString("en-PH",{year:"numeric",month:"2-digit",day:"2-digit"});
    var note='"'+(e.n||"").replace(/"/g,'""')+'"';
    var credit=e.cid?'"'+cn(e.cid)+'"':"";
    rows.push(date+","+cat.l+","+e.a+","+note+","+credit);
  });
  var csv=rows.join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var url=window.URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="expenses_"+dk(new Date())+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  window.URL.revokeObjectURL(url);
  fl("CSV exported!");
}

  html+='@media print{body{padding:0}}</style></head><body>';

  html+='<h1>💰 Expenses Report</h1>';
  html+='<div class="sub">Generated '+new Date().toLocaleDateString("en-PH",{weekday:"long",month:"long",day:"numeric",year:"numeric"})+'</div>';
  html+='<div class="total">'+fm(total)+'</div>';
  html+='<div class="sub">'+S.e.length+' total entries</div>';

  });

  // Credits summary
  if(S.cr.length){
    html+='<h2>Credits / Loans</h2><table><tr><th>Name</th><th style="text-align:right">Total</th><th style="text-align:right">Paid</th><th style="text-align:right">Remaining</th></tr>';
    S.cr.forEach(function(cr){
      html+='<tr><td>'+cr.name+'</td><td style="text-align:right">'+fm(cr.t)+'</td><td style="text-align:right;color:#22C55E">'+fm(cr.p||0)+'</td><td style="text-align:right;color:#DC2626;font-weight:600">'+fm(cr.t-(cr.p||0))+'</td></tr>';
    });
    html+='</table>';
  }

  html+='<h2>All Transactions</h2><table><tr><th>Date</th><th>Category</th><th>Note</th><th style="text-align:right">Amount</th></tr>';
  S.e.forEach(function(e){
    var cat=co(e.cat);
    var date=new Date(e.d).toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"});
    html+='<tr><td>'+date+'</td><td>'+cat.i+' '+cat.l+'</td><td style="color:#999">'+(e.n||"—")+'</td><td style="text-align:right;font-weight:600">'+fm(e.a)+'</td></tr>';
  });
